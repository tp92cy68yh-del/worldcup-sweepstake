}

.refresh-btn {

}
.refresh-btn:hover { background: #0d3b1f; }
.refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.lb-row:last-child { border-bottom: none; }
.lb-row:hover { background: #f8fbf8; }

.lb-rank {

}
.lb-pts-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

/* έΦΑέΦΑ PLAYERS GRID έΦΑέΦΑ */
.players-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 14px;
}

.player-card {

  border-radius: 14px;
  border: 1px solid #d0e4d0;
  overflow: hidden;
  box-shadow: 0 2px 10px rgba(0,60,0,0.05);
}

.player-header {

}

<script>
// έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
// DRAW ASSIGNMENTS (from the sweepstake draw)
// έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
const DRAW = [

    teams: ['Algeria','Senegal','Croatia','Argentina','Ivory Coast','Iran','Australia','Uruguay']

  },

  },

  },

  }
];

// Team flags
const FLAGS = {
  'Algeria':'ΏθΘσΏθΘ┐','Argentina':'ΏθΘοΏθΘ╖','Australia':'ΏθΘοΏθΘ║','Austria':'ΏθΘοΏθΘ╣','Belgium':'ΏθΘπΏθΘς',
  'Bosnia & Herz.':'ΏθΘπΏθΘο','Brazil':'ΏθΘπΏθΘ╖','Canada':'ΏθΘρΏθΘο','Cape Verde':'ΏθΘρΏθΘ╗',
  'Colombia':'ΏθΘρΏθΘ┤','Croatia':'ΏθΘφΏθΘ╖','Cura├πao':'ΏθΘρΏθΘ╝','Czech Republic':'ΏθΘρΏθΘ┐',
  'DR Congo':'ΏθΘρΏθΘσ','Ecuador':'ΏθΘςΏθΘρ','Egypt':'ΏθΘςΏθΘυ','England':'ΏθΠ┤≤ιΒπ≤ιΒλ≤ιΒξ≤ιΒχ≤ιΒπ≤ιΒ┐','France':'ΏθΘτΏθΘ╖',
  'Germany':'ΏθΘσΏθΘς','Ghana':'ΏθΘυΏθΘφ','Haiti':'ΏθΘφΏθΘ╣','Iran':'ΏθΘχΏθΘ╖','Iraq':'ΏθΘχΏθΘ╢',
  'Ivory Coast':'ΏθΘρΏθΘχ','Japan':'ΏθΘψΏθΘ╡','Jordan':'ΏθΘψΏθΘ┤','Mexico':'ΏθΘ▓ΏθΘ╜','Morocco':'ΏθΘ▓ΏθΘο',
  'Netherlands':'ΏθΘ│ΏθΘ▒','New Zealand':'ΏθΘ│ΏθΘ┐','Norway':'ΏθΘ│ΏθΘ┤','Panama':'ΏθΘ╡ΏθΘο',
  'Paraguay':'ΏθΘ╡ΏθΘ╛','Portugal':'ΏθΘ╡ΏθΘ╣','Qatar':'ΏθΘ╢ΏθΘο','Saudi Arabia':'ΏθΘ╕ΏθΘο',
  'Scotland':'ΏθΠ┤≤ιΒπ≤ιΒλ≤ιΒ│≤ιΒμ≤ιΒ┤≤ιΒ┐','Senegal':'ΏθΘ╕ΏθΘ│','South Africa':'ΏθΘ┐ΏθΘο','South Korea':'ΏθΘ░ΏθΘ╖',
  'Spain':'ΏθΘςΏθΘ╕','Sweden':'ΏθΘ╕ΏθΘς','Switzerland':'ΏθΘρΏθΘφ','Tunisia':'ΏθΘ╣ΏθΘ│','Turkey':'ΏθΘ╣ΏθΘ╖',
  'USA':'ΏθΘ║ΏθΘ╕','Uruguay':'ΏθΘ║ΏθΘ╛','Uzbekistan':'ΏθΘ║ΏθΘ┐'
};

// JSON έΗΤ sweepstake name aliases
const ALIASES = {
  'United States': 'USA',
  "C├┤te d'Ivoire": 'Ivory Coast',
  'Ivory Coast': 'Ivory Coast',
  'Korea Republic': 'South Korea',
  'South Korea': 'South Korea',
  'Bosnia-Herzegovina': 'Bosnia & Herz.',
  'Bosnia and Herzegovina': 'Bosnia & Herz.',
  'Bosnia & Herzegovina': 'Bosnia & Herz.',
  'DR Congo': 'DR Congo',
  'Congo DR': 'DR Congo',
  "Cote d'Ivoire": 'Ivory Coast',
  'IR Iran': 'Iran',
  'Korea DPR': 'DR Congo', // just in case
};

function norm(name) {
  return ALIASES[name] || name;
}

// Knockout round ordering (higher = further)
const ROUND_ORDER = {
  'Round of 32': 1,
  'Round of 16': 2,
  'Quarter-final': 3,
  'Semi-final': 4,
  'Final': 5,
};

// Sweepstake bonus points per round won
const ROUND_BONUS = {
  'groups_qualified': 3,   // qualified from group stage
  'Round of 32': 5,
  'Round of 16': 10,
  'Quarter-final': 15,
  'Semi-final': 20,
  'Final_winner': 30,
  'Final_runnerup': 0,
};

// έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
// DATA LOADING + PROCESSING
// έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
const DATA_URL = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  document.getElementById('statusText').textContent = 'LoadingέΑο';
  document.getElementById('statusDot').className = 'status-dot';

  try {
    const resp = await fetch(DATA_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();

    const teamStats = processMatches(data.matches || []);
    renderAll(teamStats);

    const now = new Date();
    document.getElementById('statusText').textContent =
      'Updated ' + now.toLocaleTimeString();
    document.getElementById('statusDot').className = 'status-dot ok';
  } catch(e) {
    document.getElementById('statusText').textContent = 'Error loading data';
    document.getElementById('statusDot').className = 'status-dot err';
    document.getElementById('main').innerHTML = `
      <div class="error-box">
        έγιΎ╕Π Could not load match data.<br>
        <small>${e.message}</small><br><br>
        This may be a network issue. Try refreshing, or check your internet connection.<br>
        <a href="${DATA_URL}" target="_blank" style="color:#721c24">View raw data</a>
      </div>
    `;
  } finally {
    btn.disabled = false;
  }
}

function processMatches(matches) {
  // Build per-team stats
  const stats = {}; // teamName -> stats object

  function ensureTeam(name) {
    if (!stats[name]) {
      stats[name] = {
        gp: 0, gw: 0, gd: 0, gl: 0, gf: 0, ga: 0, gpts: 0,
        knockoutWins: {},   // round -> boolean (won)
        knockoutLosses: {}, // round -> boolean (lost)
        furthestRound: null,
        isEliminated: false,
        isWinner: false,
        isRunnerUp: false,
      };
    }
    return stats[name];
  }

  // Determine winner of a knockout match (handles ET and penalties)
  function getWinner(match) {
    const s = match.score;
    if (!s) return null;
    // Use penalties > extra time > full time
    const [g1, g2] = s.p || s.et || s.ft || [null, null];
    if (g1 === null) return null;
    if (g1 > g2) return { winner: match.team1, loser: match.team2 };
    if (g2 > g1) return { winner: match.team2, loser: match.team1 };
    return null; // draw (shouldn't happen in knockouts)
  }

  // Track which teams have appeared in knockout rounds (= qualified from groups)
  const appearedInKnockout = new Set();

  for (const m of matches) {
    const t1 = norm(m.team1);
    const t2 = norm(m.team2);

    // Skip TBD / placeholder teams (like W1, A1, etc.)
    const isTBD = (n) => /^[A-Z]\d+$/.test(n) || /^W\d+$/.test(n) || /^L\d+$/.test(n) || n.length <= 3 && /\d/.test(n);
    if (isTBD(t1) || isTBD(t2)) continue;

    if (m.group) {
      // GROUP STAGE
      if (!m.score) continue; // not played yet
      const [g1, g2] = m.score.ft || [0, 0];

      const s1 = ensureTeam(t1);
      const s2 = ensureTeam(t2);

      s1.gp++; s2.gp++;
      s1.gf += g1; s1.ga += g2;
      s2.gf += g2; s2.ga += g1;

      if (g1 > g2) {
        s1.gw++; s1.gpts += 3; s2.gl++;
      } else if (g1 === g2) {
        s1.gd++; s1.gpts++;
        s2.gd++; s2.gpts++;
      } else {
        s2.gw++; s2.gpts += 3; s1.gl++;
      }
    } else {
      // KNOCKOUT STAGE
      const round = m.round || '';
      const roundOrder = ROUND_ORDER[round] || 0;
      if (!roundOrder) continue;

      // Just appearing in knockout means qualified from groups
      [t1, t2].forEach(t => {
        ensureTeam(t);
        appearedInKnockout.add(t);
        if (!stats[t].furthestRound || ROUND_ORDER[stats[t].furthestRound] < roundOrder) {
          stats[t].furthestRound = round;
        }
      });

      if (!m.score) continue; // not played yet

      const result = getWinner(m);
      if (!result) continue;

      const { winner, loser } = result;

      ensureTeam(winner);
      ensureTeam(loser);

      if (round === 'Final') {
        stats[winner].isWinner = true;
        stats[loser].isRunnerUp = true;
        stats[loser].isEliminated = true;
      } else {
        stats[loser].isEliminated = true;
      }

      stats[winner].knockoutWins[round] = true;
      stats[loser].knockoutLosses[round] = true;
    }
  }

  return { stats, appearedInKnockout };
}

// έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
// SCORING
// έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
function calcPoints(teamName, stats, appearedInKnockout) {
  const s = stats[teamName];
  if (!s) return 0;

  let pts = 0;

  // Group points (3 per win, 1 per draw)
  pts += s.gpts;

  // Qualified from group stage
  if (appearedInKnockout.has(teamName)) pts += ROUND_BONUS['groups_qualified'];

  // Knockout wins
  for (const round of Object.keys(s.knockoutWins)) {
    if (round === 'Final') {
      pts += ROUND_BONUS['Final_winner'];
    } else {
      pts += ROUND_BONUS[round] || 0;
    }
  }

  return pts;
}

// έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
// RENDERING
// έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
function getTeamStatus(teamName, s, appearedInKnockout) {
  if (!s) return { label: 'Not Started', badgeClass: 'badge-pending', rowClass: 'pending' };
  if (s.isWinner) return { label: 'ΏθΠΗ Winner!', badgeClass: 'badge-winner', rowClass: 'winner' };
  if (s.isRunnerUp) return { label: 'Runner-up', badgeClass: 'badge-runnerup', rowClass: 'eliminated' };
  if (s.isEliminated) {
    const r = s.furthestRound;
    const labels = { 'Round of 32': 'Out R32', 'Round of 16': 'Out R16', 'Quarter-final': 'Out QF', 'Semi-final': 'Out SF' };
    return { label: labels[r] || 'Eliminated', badgeClass: 'badge-out', rowClass: 'eliminated' };
  }
  if (s.furthestRound) {
    const r = s.furthestRound;
    const labels = { 'Round of 32': 'R32', 'Round of 16': 'R16', 'Quarter-final': 'QF', 'Semi-final': 'SF', 'Final': 'Final' };
    const classes = { 'Round of 32': 'badge-r32', 'Round of 16': 'badge-r16', 'Quarter-final': 'badge-qf', 'Semi-final': 'badge-sf', 'Final': 'badge-sf' };
    return { label: 'έεΥ ' + (labels[r] || r), badgeClass: classes[r] || 'badge-active', rowClass: 'active' };
  }
  // Still in group stage
  if (s.gp > 0) {
    return { label: 'Groups', badgeClass: 'badge-active', rowClass: 'active' };
  }
  return { label: 'Upcoming', badgeClass: 'badge-pending', rowClass: 'pending' };
}

function renderAll({ stats, appearedInKnockout }) {
  // Calculate player totals
  const players = DRAW.map(p => {
    const total = p.teams.reduce((sum, t) => sum + calcPoints(t, stats, appearedInKnockout), 0);
    const alive = p.teams.filter(t => {
      const s = stats[t];
      return !s || (!s.isEliminated && !s.isRunnerUp);
    }).length;
    return { ...p, total, alive };
  }).sort((a, b) => b.total - a.total);

  const maxPts = players[0]?.total || 1;

  // Check if any matches have been played
  const anyPlayed = Object.keys(stats).length > 0;

  let html = '';

  // έΦΑέΦΑ SCORING KEY έΦΑέΦΑ
  html += `
    <div class="scoring-info">
      <strong>Points:</strong>
      Group win <strong>+3</strong> ┬╖ Draw <strong>+1</strong> ┬╖
      Qualify from groups <strong>+3</strong> ┬╖
      Win R32 <strong>+5</strong> ┬╖ Win R16 <strong>+10</strong> ┬╖
      Win QF <strong>+15</strong> ┬╖ Win SF <strong>+20</strong> ┬╖
      <strong>Tournament winner +30</strong>
    </div>
  `;

  // έΦΑέΦΑ LEADERBOARD έΦΑέΦΑ
  html += `<div class="leaderboard-card"><div class="section-title">ΏθΠΖ Leaderboard</div>`;

  if (!anyPlayed) {
    html += `<div style="text-align:center;padding:24px 16px;color:#888;font-size:14px;">
      έγ╜ The tournament begins <strong>11 June 2026</strong> έΑΦ check back then for live standings!
    </div>`;
  } else {
    players.forEach((p, i) => {
      const rankClass = i === 0 ? 'p1' : i === 1 ? 'p2' : i === 2 ? 'p3' : '';
      const rankEmoji = i === 0 ? 'ΏθξΘ' : i === 1 ? 'ΏθξΙ' : i === 2 ? 'ΏθξΚ' : (i + 1);
      const barPct = maxPts > 0 ? Math.round((p.total / maxPts) * 100) : 0;
      html += `
        <div class="lb-row">
          <div class="lb-rank ${rankClass}">${rankEmoji}</div>
          <div class="lb-avatar" style="background:linear-gradient(135deg,${p.color},${p.color2})">${p.name[0]}</div>
          <div style="flex:1">
            <div class="lb-name">${p.name}</div>
            <div class="lb-meta">${p.alive} team${p.alive !== 1 ? 's' : ''} still in</div>
          </div>
          <div class="lb-bar-wrap" style="margin-right:12px">
            <div class="lb-bar" style="width:${barPct}%"></div>
          </div>
          <div>
            <div class="lb-pts" style="color:${p.color}">${p.total}</div>
            <div class="lb-pts-label">pts</div>
          </div>
        </div>
      `;
    });
  }
  html += `</div>`;

  // έΦΑέΦΑ PLAYER CARDS έΦΑέΦΑ
  html += `<div class="players-grid">`;

  // Render in original draw order, not sorted
  DRAW.forEach(p => {
    const pData = players.find(x => x.name === p.name);
    const total = pData?.total || 0;
    const alive = pData?.alive ?? p.teams.length;

    html += `
      <div class="player-card">
        <div class="player-header">
          <div class="p-avatar" style="background:linear-gradient(135deg,${p.color},${p.color2})">${p.name[0]}</div>
          <div style="flex:1">
            <div class="p-name">${p.name}</div>
            <div class="p-sub">${alive} of 8 teams still in</div>
          </div>
          <div class="p-pts">
            <div class="p-pts-num" style="color:${p.color}">${total}</div>
            <div class="p-pts-label">pts</div>
          </div>
        </div>
        <div class="teams-list">
    `;

    // Sort teams: winner first, then by sweepstake pts desc, then eliminated last
    const sorted = [...p.teams].sort((a, b) => {
      const sa = stats[a], sb = stats[b];
      if (sa?.isWinner && !sb?.isWinner) return -1;
      if (!sa?.isWinner && sb?.isWinner) return 1;
      const pa = calcPoints(a, stats, appearedInKnockout);
      const pb = calcPoints(b, stats, appearedInKnockout);
      if (pa !== pb) return pb - pa;
      if (sa?.isEliminated && !sb?.isEliminated) return 1;
      if (!sa?.isEliminated && sb?.isEliminated) return -1;
      return 0;
    });

    sorted.forEach(teamName => {
      const s = stats[teamName];
      const { label, badgeClass, rowClass } = getTeamStatus(teamName, s, appearedInKnockout);
      const flag = FLAGS[teamName] || 'ΏθΠ│';
      const record = s && s.gp > 0
        ? `${s.gw}W ${s.gd}D ${s.gl}L`
        : '';
      const teamPts = calcPoints(teamName, stats, appearedInKnockout);
      const ptsDisplay = anyPlayed ? `<span style="font-size:11px;font-weight:700;color:#555;margin-right:4px">${teamPts}pt</span>` : '';

      html += `
        <div class="team-row ${rowClass}">
          <span class="t-flag">${flag}</span>
          <span class="t-name">${teamName}</span>
          ${ptsDisplay}
          <span class="t-record">${record}</span>
          <span class="t-badge ${badgeClass}">${label}</span>
        </div>
      `;
    });

    html += `</div></div>`;
  });

  html += `</div>`;

  document.getElementById('main').innerHTML = html;
  document.getElementById('main').className = '';
}

loadData();

// Auto-refresh every 5 minutes
setInterval(loadData, 5 * 60 * 1000);
</script>

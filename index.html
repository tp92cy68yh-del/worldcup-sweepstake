<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ World Cup 2026 Sweepstake Tracker</title>
<style>
:root { color-scheme: light; }
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #eef3ee;
  color: #111;
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #0d3b1f 0%, #1a6b35 100%);
  color: #fff;
  text-align: center;
  padding: 22px 16px 18px;
  position: relative;
}
.header-emoji { font-size: 40px; display: block; margin-bottom: 6px; }
.header-title {
  font-size: clamp(20px, 4vw, 32px);
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  background: linear-gradient(135deg, #ffd700, #ffb300);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-sub {
  font-size: 12px; color: rgba(255,255,255,0.6);
  letter-spacing: 3px; text-transform: uppercase; margin-top: 4px;
}

/* ── REFRESH BAR ── */
.refresh-bar {
  background: #fff;
  border-bottom: 1px solid #d8e8d8;
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; gap: 12px;
  font-size: 12px; color: #666;
  flex-wrap: wrap;
}
.refresh-bar .status-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: #ccc; margin-right: 5px;
  vertical-align: middle;
}
.refresh-bar .status-dot.ok { background: #1a6b35; }
.refresh-bar .status-dot.live { background: #e74c3c; animation: pulse 1.5s infinite; }
.refresh-bar .status-dot.err { background: #c0392b; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.refresh-btn {
  background: #1a6b35; color: #fff;
  border: none; border-radius: 6px;
  padding: 6px 14px; font-size: 12px; cursor: pointer;
  font-weight: 600; transition: background 0.2s; white-space: nowrap;
}
.refresh-btn:hover { background: #0d3b1f; }
.refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── CONTAINER ── */
.container { max-width: 1040px; margin: 0 auto; padding: 16px; }

/* ── LEADERBOARD ── */
.leaderboard-card {
  background: #fff;
  border-radius: 14px;
  border: 1px solid #d0e4d0;
  overflow: hidden;
  margin-bottom: 20px;
  box-shadow: 0 2px 12px rgba(0,60,0,0.06);
}
.section-title {
  background: linear-gradient(135deg, #0d3b1f, #1a6b35);
  color: #ffd700;
  padding: 11px 16px;
  font-size: 12px; font-weight: 800;
  letter-spacing: 3px; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}

.lb-row {
  display: flex; align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid #f4f4f4;
  gap: 10px;
  transition: background 0.1s;
}
.lb-row:last-child { border-bottom: none; }
.lb-row:hover { background: #f8fbf8; }

.lb-rank {
  font-size: 16px; font-weight: 900; color: #bbb;
  width: 28px; text-align: center; flex-shrink: 0;
}
.lb-rank.p1 { color: #c8960c; }
.lb-rank.p2 { color: #8a9ba8; }
.lb-rank.p3 { color: #a0722d; }

.lb-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 15px; color: #fff;
  flex-shrink: 0;
}

.lb-name { flex: 1; font-weight: 700; font-size: 15px; }
.lb-meta { font-size: 11px; color: #999; }

.lb-bar-wrap { width: 120px; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
.lb-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #1a6b35, #52c27a); transition: width 0.6s ease; }

.lb-pts {
  text-align: right; min-width: 52px;
  font-size: 22px; font-weight: 900;
}
.lb-pts-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

/* ── PLAYERS GRID ── */
.players-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 14px;
}

.player-card {
  background: #fff;
  border-radius: 14px;
  border: 1px solid #d0e4d0;
  overflow: hidden;
  box-shadow: 0 2px 10px rgba(0,60,0,0.05);
}

.player-header {
  display: flex; align-items: center;
  padding: 12px 14px;
  gap: 10px;
  border-bottom: 2px solid #f0f7f0;
}

.p-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 18px; color: #fff;
  flex-shrink: 0;
}

.p-name { font-weight: 900; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
.p-sub { font-size: 11px; color: #888; margin-top: 1px; }

.p-pts { text-align: right; }
.p-pts-num {
  font-size: 28px; font-weight: 900; line-height: 1;
}
.p-pts-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

/* ── TEAM ROWS ── */
.teams-list { padding: 8px 10px 10px; }

.team-row {
  display: flex; align-items: center;
  padding: 5px 7px;
  border-radius: 8px;
  margin-bottom: 2px;
  gap: 7px;
}

.team-row.active   { background: #f0faf0; }
.team-row.winner   { background: #fffce0; border: 1px solid #ffd700; }
.team-row.eliminated { background: #fafafa; opacity: 0.5; }
.team-row.pending  { background: #fafafa; }

.t-flag { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }
.t-name { flex: 1; font-size: 12px; font-weight: 700; }
.t-record { font-size: 11px; color: #999; white-space: nowrap; margin-right: 2px; }
.t-gd {
  font-size: 11px; font-weight: 700; white-space: nowrap;
  padding: 1px 5px; border-radius: 4px;
  flex-shrink: 0;
}
.t-gd.pos { background: #d4edda; color: #155724; }
.t-gd.neg { background: #f8d7da; color: #721c24; }
.t-gd.zero { background: #f0f0f0; color: #666; }

.t-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
  padding: 2px 6px; border-radius: 10px; white-space: nowrap; flex-shrink: 0;
}
.badge-winner    { background: #ffd700; color: #5a3e00; }
.badge-runnerup  { background: #c0392b; color: #fff; }
.badge-sf        { background: #ede4fa; color: #6f42c1; }
.badge-qf        { background: #d1ecf1; color: #0c5460; }
.badge-r16       { background: #d4edda; color: #155724; }
.badge-r32       { background: #fff3cd; color: #856404; }
.badge-active    { background: #d4edda; color: #155724; }
.badge-out       { background: #f8d7da; color: #721c24; }
.badge-pending   { background: #f0f0f0; color: #888; }

/* ── LOADING ── */
.loading-wrap {
  text-align: center; padding: 60px 20px; color: #666;
}
.spinner {
  display: inline-block; width: 36px; height: 36px;
  border: 3px solid #e0e0e0; border-top-color: #1a6b35;
  border-radius: 50%; animation: spin 0.7s linear infinite;
  margin-bottom: 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-box {
  background: #fff3f3; border: 1px solid #f5c6cb;
  border-radius: 10px; padding: 16px; color: #721c24;
  text-align: center; margin: 20px 0;
  font-size: 14px; line-height: 1.6;
}

/* ── SCORING INFO ── */
.scoring-info {
  background: #fff;
  border-radius: 10px;
  border: 1px solid #d0e4d0;
  padding: 12px 16px;
  margin-bottom: 20px;
  font-size: 12px; color: #555;
  line-height: 1.7;
}
.scoring-info strong { color: #1a6b35; }

/* ── FOOTER ── */
.footer {
  text-align: center; padding: 20px;
  font-size: 11px; color: #aaa;
}

@media (max-width: 640px) {
  .players-grid { grid-template-columns: 1fr; }
  .lb-bar-wrap { display: none; }
}
</style>
</head>
<body>

<div class="header">
  <span class="header-emoji">🏆</span>
  <h1 class="header-title">World Cup 2026 Sweepstake</h1>
  <div class="header-sub">Live Tracker</div>
</div>

<div class="refresh-bar">
  <span id="lastUpdated">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Loading…</span>
  </span>
  <button class="refresh-btn" id="refreshBtn" onclick="loadData()">↻ Refresh</button>
</div>

<div class="container">
  <div id="main" class="loading-wrap">
    <div class="spinner"></div>
    <div>Fetching latest World Cup data…</div>
  </div>
</div>

<div class="footer">
  Live data: <a href="https://worldcup26.ir" target="_blank" style="color:#1a6b35">worldcup26.ir</a> · Updates in real-time during matches · Auto-refreshes every 2 min
</div>

<script>
// ──────────────────────────────────────────────────────────────────────────
// DRAW ASSIGNMENTS
// ──────────────────────────────────────────────────────────────────────────
const DRAW = [
  {
    name: 'Fin', color: '#e74c3c', color2: '#c0392b',
    teams: ['Algeria','Senegal','Croatia','Argentina','Ivory Coast','Iran','Australia','Uruguay']
  },
  {
    name: 'Ellen', color: '#3498db', color2: '#2980b9',
    teams: ['Netherlands','Japan','Qatar','Colombia','USA','Tunisia','England','Paraguay']
  },
  {
    name: 'Kieran', color: '#2ecc71', color2: '#27ae60',
    teams: ['Austria','Morocco','Ecuador','Ghana','South Korea','Scotland','France','Sweden']
  },
  {
    name: 'Rachael', color: '#f39c12', color2: '#d68910',
    teams: ['Bosnia & Herz.','Curaçao','Turkey','Brazil','Iraq','Jordan','Cape Verde','Saudi Arabia']
  },
  {
    name: 'Ian', color: '#9b59b6', color2: '#8e44ad',
    teams: ['Germany','Mexico','Canada','Czech Republic','Portugal','Switzerland','DR Congo','Egypt']
  },
  {
    name: 'Jane', color: '#1abc9c', color2: '#16a085',
    teams: ['Panama','Spain','South Africa','Belgium','New Zealand','Haiti','Uzbekistan','Norway']
  }
];

// Team flags
const FLAGS = {
  'Algeria':'🇩🇿','Argentina':'🇦🇷','Australia':'🇦🇺','Austria':'🇦🇹','Belgium':'🇧🇪',
  'Bosnia & Herz.':'🇧🇦','Brazil':'🇧🇷','Canada':'🇨🇦','Cape Verde':'🇨🇻',
  'Colombia':'🇨🇴','Croatia':'🇭🇷','Curaçao':'🇨🇼','Czech Republic':'🇨🇿',
  'DR Congo':'🇨🇩','Ecuador':'🇪🇨','Egypt':'🇪🇬','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','France':'🇫🇷',
  'Germany':'🇩🇪','Ghana':'🇬🇭','Haiti':'🇭🇹','Iran':'🇮🇷','Iraq':'🇮🇶',
  'Ivory Coast':'🇨🇮','Japan':'🇯🇵','Jordan':'🇯🇴','Mexico':'🇲🇽','Morocco':'🇲🇦',
  'Netherlands':'🇳🇱','New Zealand':'🇳🇿','Norway':'🇳🇴','Panama':'🇵🇦',
  'Paraguay':'🇵🇾','Portugal':'🇵🇹','Qatar':'🇶🇦','Saudi Arabia':'🇸🇦',
  'Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','Senegal':'🇸🇳','South Africa':'🇿🇦','South Korea':'🇰🇷',
  'Spain':'🇪🇸','Sweden':'🇸🇪','Switzerland':'🇨🇭','Tunisia':'🇹🇳','Turkey':'🇹🇷',
  'USA':'🇺🇸','Uruguay':'🇺🇾','Uzbekistan':'🇺🇿','Iraq':'🇮🇶'
};

// API name → sweepstake name aliases
const ALIASES = {
  // USA
  'United States': 'USA',
  'United States of America': 'USA',
  // Ivory Coast
  "Côte d'Ivoire": 'Ivory Coast',
  "Cote d'Ivoire": 'Ivory Coast',
  'Ivory Coast': 'Ivory Coast',
  // South Korea
  'Korea Republic': 'South Korea',
  'Republic of Korea': 'South Korea',
  'South Korea': 'South Korea',
  // Bosnia
  'Bosnia-Herzegovina': 'Bosnia & Herz.',
  'Bosnia and Herzegovina': 'Bosnia & Herz.',
  'Bosnia & Herzegovina': 'Bosnia & Herz.',
  // DR Congo
  'Congo DR': 'DR Congo',
  'Democratic Republic of the Congo': 'DR Congo',
  'Democratic Republic of Congo': 'DR Congo',
  // Iran
  'IR Iran': 'Iran',
  'Islamic Republic of Iran': 'Iran',
  // Turkey
  'Türkiye': 'Turkey',
  'Turkiye': 'Turkey',
  // Czech Republic
  'Czechia': 'Czech Republic',
  'Czech Republic': 'Czech Republic',
  // Curaçao
  'Curacao': 'Curaçao',
};

function norm(name) {
  if (!name) return name;
  return ALIASES[name] || name;
}

// Knockout round ordering
const ROUND_ORDER = {
  'Round of 32': 1,
  'Round of 16': 2,
  'Quarter-final': 3,
  'Semi-final': 4,
  'Final': 5,
};

// Normalize round names from API
function normRound(r) {
  if (!r) return null;
  const map = {
    'round of 32': 'Round of 32', 'round_32': 'Round of 32', 'r32': 'Round of 32',
    'round of 16': 'Round of 16', 'round_16': 'Round of 16', 'r16': 'Round of 16',
    'quarter-final': 'Quarter-final', 'quarterfinal': 'Quarter-final', 'quarter final': 'Quarter-final', 'qf': 'Quarter-final',
    'semi-final': 'Semi-final', 'semifinal': 'Semi-final', 'semi final': 'Semi-final', 'sf': 'Semi-final',
    'final': 'Final',
  };
  return map[r.toLowerCase()] || r;
}

// Sweepstake bonus points per round
const ROUND_BONUS = {
  'groups_qualified': 3,
  'Round of 32': 5,
  'Round of 16': 10,
  'Quarter-final': 15,
  'Semi-final': 20,
  'Final_winner': 30,
  'Final_runnerup': 0,
};

// ──────────────────────────────────────────────────────────────────────────
// LIVE API (worldcup26.ir) — real-time updates during matches
// ──────────────────────────────────────────────────────────────────────────
const API_BASE = 'https://worldcup26.ir';
const GUEST_EMAIL = 'wc26-sweepstake-tracker-xk9m2@mailnull.com';
const GUEST_PASS  = 'Tracker2026!xk9';
let _token = null;

async function getToken() {
  if (_token) return _token;

  // Try login first
  try {
    const r = await fetch(`${API_BASE}/auth/authenticate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: GUEST_EMAIL, password: GUEST_PASS })
    });
    const d = await r.json();
    if (d.token) { _token = d.token; return _token; }
  } catch(_) {}

  // Not registered yet — register then login
  try {
    await fetch(`${API_BASE}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: 'WC26 Sweepstake Tracker', email: GUEST_EMAIL, password: GUEST_PASS })
    });
  } catch(_) {}

  // Login after register
  const r2 = await fetch(`${API_BASE}/auth/authenticate`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: GUEST_EMAIL, password: GUEST_PASS })
  });
  const d2 = await r2.json();
  if (d2.token) { _token = d2.token; return _token; }

  throw new Error('Auth failed');
}

async function fetchAPI(path, token) {
  const r = await fetch(`${API_BASE}${path}`, {
    headers: { 'Authorization': `Bearer ${token}` }
  });
  if (!r.ok) throw new Error(`API ${path} → HTTP ${r.status}`);
  return r.json();
}

// Fallback: openfootball (daily updates)
const FALLBACK_URL = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';

// ──────────────────────────────────────────────────────────────────────────
// DATA LOADING
// ──────────────────────────────────────────────────────────────────────────
async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  document.getElementById('statusText').textContent = 'Loading…';
  document.getElementById('statusDot').className = 'status-dot';

  let teamStats = null;
  let usingLive = false;

  // ── Try live API ──
  try {
    const token = await getToken();
    const [teamsData, gamesData] = await Promise.all([
      fetchAPI('/get/teams', token),
      fetchAPI('/get/games', token)
    ]);

    // Build id → normalised name map
    const teamMap = {};
    for (const t of teamsData) {
      const id = String(t.id || t._id || '');
      if (id) teamMap[id] = norm(t.name_en || t.name || '');
    }

    teamStats = processLiveGames(gamesData, teamMap);
    usingLive = true;
  } catch(liveErr) {
    // ── Fallback to openfootball ──
    try {
      const resp = await fetch(FALLBACK_URL + '?t=' + Date.now());
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      teamStats = processFallbackMatches(data.matches || []);
    } catch(fallbackErr) {
      document.getElementById('statusText').textContent = 'Error loading data';
      document.getElementById('statusDot').className = 'status-dot err';
      document.getElementById('main').innerHTML = `
        <div class="error-box">
          ⚠️ Could not load match data.<br>
          <small>Live API: ${String(liveErr.message)} · Fallback: ${String(fallbackErr.message)}</small><br><br>
          Try refreshing, or check your internet connection.
        </div>
      `;
      btn.disabled = false;
      return;
    }
  }

  renderAll(teamStats);

  const now = new Date();
  document.getElementById('statusText').textContent =
    (usingLive ? '🔴 Live · ' : '') + 'Updated ' + now.toLocaleTimeString();
  document.getElementById('statusDot').className = usingLive ? 'status-dot live' : 'status-dot ok';
  btn.disabled = false;
}

// ──────────────────────────────────────────────────────────────────────────
// PROCESS LIVE API GAMES
// ──────────────────────────────────────────────────────────────────────────
function processLiveGames(games, teamMap) {
  const stats = {};
  const appearedInKnockout = new Set();

  function ensureTeam(name) {
    if (!stats[name]) {
      stats[name] = {
        gp: 0, gw: 0, gdraw: 0, gl: 0, gf: 0, ga: 0, gpts: 0,
        knockoutWins: {}, knockoutLosses: {},
        furthestRound: null,
        isEliminated: false, isWinner: false, isRunnerUp: false,
      };
    }
    return stats[name];
  }

  for (const m of games) {
    const t1id = String(m.home_team_id || '');
    const t2id = String(m.away_team_id || '');
    const t1 = teamMap[t1id];
    const t2 = teamMap[t2id];

    // Skip if team names unknown
    if (!t1 || !t2) continue;

    // Determine stage
    const isGroup = (m.type === 'group') || !!m.group;
    const isKnockout = (m.type === 'knockout') || (!m.group && m.type !== 'group');

    if (isGroup) {
      if (!m.finished) continue; // not played yet
      const g1 = Number(m.home_score) || 0;
      const g2 = Number(m.away_score) || 0;

      const s1 = ensureTeam(t1);
      const s2 = ensureTeam(t2);

      s1.gp++; s2.gp++;
      s1.gf += g1; s1.ga += g2;
      s2.gf += g2; s2.ga += g1;

      if (g1 > g2) {
        s1.gw++; s1.gpts += 3; s2.gl++;
      } else if (g1 === g2) {
        s1.gdraw++; s1.gpts++;
        s2.gdraw++; s2.gpts++;
      } else {
        s2.gw++; s2.gpts += 3; s1.gl++;
      }

    } else if (isKnockout) {
      // Detect round
      const rawRound = m.round || m.stage || m.matchday_label || '';
      const round = normRound(String(rawRound)) || 'Round of 32';
      const roundOrder = ROUND_ORDER[round] || 0;

      [t1, t2].forEach(t => {
        ensureTeam(t);
        appearedInKnockout.add(t);
        if (!stats[t].furthestRound || (ROUND_ORDER[stats[t].furthestRound] || 0) < roundOrder) {
          stats[t].furthestRound = round;
        }
      });

      if (!m.finished) continue;

      // Determine winner: use penalties > extra time > regular
      let g1 = Number(m.home_score_pen ?? m.home_score_et ?? m.home_score) || 0;
      let g2 = Number(m.away_score_pen ?? m.away_score_et ?? m.away_score) || 0;

      if (g1 === g2) continue; // no result yet

      const winner = g1 > g2 ? t1 : t2;
      const loser  = g1 > g2 ? t2 : t1;

      ensureTeam(winner); ensureTeam(loser);

      if (round === 'Final') {
        stats[winner].isWinner = true;
        stats[loser].isRunnerUp = true;
        stats[loser].isEliminated = true;
      } else {
        stats[loser].isEliminated = true;
      }

      stats[winner].knockoutWins[round] = true;
      stats[loser].knockoutLosses[round] = true;
    }
  }

  return { stats, appearedInKnockout };
}

// ──────────────────────────────────────────────────────────────────────────
// FALLBACK: OPENFOOTBALL FORMAT
// ──────────────────────────────────────────────────────────────────────────
function processFallbackMatches(matches) {
  const stats = {};
  const appearedInKnockout = new Set();

  function ensureTeam(name) {
    if (!stats[name]) {
      stats[name] = {
        gp: 0, gw: 0, gdraw: 0, gl: 0, gf: 0, ga: 0, gpts: 0,
        knockoutWins: {}, knockoutLosses: {},
        furthestRound: null,
        isEliminated: false, isWinner: false, isRunnerUp: false,
      };
    }
    return stats[name];
  }

  function getWinner(match) {
    const s = match.score;
    if (!s) return null;
    const [g1, g2] = s.p || s.et || s.ft || [null, null];
    if (g1 === null) return null;
    if (g1 > g2) return { winner: norm(match.team1), loser: norm(match.team2) };
    if (g2 > g1) return { winner: norm(match.team2), loser: norm(match.team1) };
    return null;
  }

  const isTBD = (n) => /^[A-Z]\d+$/.test(n) || /^W\d+$/.test(n) || /^L\d+$/.test(n) || (n.length <= 3 && /\d/.test(n));

  for (const m of matches) {
    const t1 = norm(m.team1);
    const t2 = norm(m.team2);
    if (isTBD(t1) || isTBD(t2)) continue;

    if (m.group) {
      if (!m.score) continue;
      const [g1, g2] = m.score.ft || [0, 0];
      const s1 = ensureTeam(t1);
      const s2 = ensureTeam(t2);
      s1.gp++; s2.gp++;
      s1.gf += g1; s1.ga += g2;
      s2.gf += g2; s2.ga += g1;
      if (g1 > g2) { s1.gw++; s1.gpts += 3; s2.gl++; }
      else if (g1 === g2) { s1.gdraw++; s1.gpts++; s2.gdraw++; s2.gpts++; }
      else { s2.gw++; s2.gpts += 3; s1.gl++; }
    } else {
      const round = normRound(m.round || '') || 'Round of 32';
      const roundOrder = ROUND_ORDER[round] || 0;
      if (!roundOrder) continue;

      [t1, t2].forEach(t => {
        ensureTeam(t);
        appearedInKnockout.add(t);
        if (!stats[t].furthestRound || (ROUND_ORDER[stats[t].furthestRound] || 0) < roundOrder) {
          stats[t].furthestRound = round;
        }
      });

      if (!m.score) continue;
      const result = getWinner(m);
      if (!result) continue;

      const { winner, loser } = result;
      ensureTeam(winner); ensureTeam(loser);

      if (round === 'Final') {
        stats[winner].isWinner = true;
        stats[loser].isRunnerUp = true;
        stats[loser].isEliminated = true;
      } else {
        stats[loser].isEliminated = true;
      }

      stats[winner].knockoutWins[round] = true;
      stats[loser].knockoutLosses[round] = true;
    }
  }

  return { stats, appearedInKnockout };
}

// ──────────────────────────────────────────────────────────────────────────
// SCORING
// ──────────────────────────────────────────────────────────────────────────
function calcPoints(teamName, stats, appearedInKnockout) {
  const s = stats[teamName];
  if (!s) return 0;
  let pts = s.gpts;
  if (appearedInKnockout.has(teamName)) pts += ROUND_BONUS['groups_qualified'];
  for (const round of Object.keys(s.knockoutWins)) {
    pts += round === 'Final' ? ROUND_BONUS['Final_winner'] : (ROUND_BONUS[round] || 0);
  }
  return pts;
}

// ──────────────────────────────────────────────────────────────────────────
// RENDERING
// ──────────────────────────────────────────────────────────────────────────
function getTeamStatus(teamName, s, appearedInKnockout) {
  if (!s) return { label: 'Not Started', badgeClass: 'badge-pending', rowClass: 'pending' };
  if (s.isWinner) return { label: '🏆 Winner!', badgeClass: 'badge-winner', rowClass: 'winner' };
  if (s.isRunnerUp) return { label: 'Runner-up', badgeClass: 'badge-runnerup', rowClass: 'eliminated' };
  if (s.isEliminated) {
    const r = s.furthestRound;
    const labels = { 'Round of 32': 'Out R32', 'Round of 16': 'Out R16', 'Quarter-final': 'Out QF', 'Semi-final': 'Out SF' };
    return { label: labels[r] || 'Eliminated', badgeClass: 'badge-out', rowClass: 'eliminated' };
  }
  if (s.furthestRound) {
    const r = s.furthestRound;
    const labels = { 'Round of 32': 'R32', 'Round of 16': 'R16', 'Quarter-final': 'QF', 'Semi-final': 'SF', 'Final': 'Final' };
    const classes = { 'Round of 32': 'badge-r32', 'Round of 16': 'badge-r16', 'Quarter-final': 'badge-qf', 'Semi-final': 'badge-sf', 'Final': 'badge-sf' };
    return { label: '✓ ' + (labels[r] || r), badgeClass: classes[r] || 'badge-active', rowClass: 'active' };
  }
  if (s.gp > 0) return { label: 'Groups', badgeClass: 'badge-active', rowClass: 'active' };
  return { label: 'Upcoming', badgeClass: 'badge-pending', rowClass: 'pending' };
}

function renderAll({ stats, appearedInKnockout }) {
  const players = DRAW.map(p => {
    const total = p.teams.reduce((sum, t) => sum + calcPoints(t, stats, appearedInKnockout), 0);
    const alive = p.teams.filter(t => {
      const s = stats[t];
      return !s || (!s.isEliminated && !s.isRunnerUp);
    }).length;
    return { ...p, total, alive };
  }).sort((a, b) => b.total - a.total);

  const maxPts = players[0]?.total || 1;
  const anyPlayed = Object.keys(stats).length > 0;

  let html = '';

  // Scoring key
  html += `
    <div class="scoring-info">
      <strong>Points:</strong>
      Group win <strong>+3</strong> · Draw <strong>+1</strong> ·
      Qualify from groups <strong>+3</strong> ·
      Win R32 <strong>+5</strong> · Win R16 <strong>+10</strong> ·
      Win QF <strong>+15</strong> · Win SF <strong>+20</strong> ·
      <strong>Tournament winner +30</strong>
    </div>
  `;

  // Leaderboard
  html += `<div class="leaderboard-card"><div class="section-title">🏅 Leaderboard</div>`;

  if (!anyPlayed) {
    html += `<div style="text-align:center;padding:24px 16px;color:#888;font-size:14px;">
      ⚽ The tournament begins <strong>11 June 2026</strong> — check back then for live standings!
    </div>`;
  } else {
    players.forEach((p, i) => {
      const rankEmoji = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
      const rankClass = i === 0 ? 'p1' : i === 1 ? 'p2' : i === 2 ? 'p3' : '';
      const barPct = maxPts > 0 ? Math.round((p.total / maxPts) * 100) : 0;
      html += `
        <div class="lb-row">
          <div class="lb-rank ${rankClass}">${rankEmoji}</div>
          <div class="lb-avatar" style="background:linear-gradient(135deg,${p.color},${p.color2})">${p.name[0]}</div>
          <div style="flex:1">
            <div class="lb-name">${p.name}</div>
            <div class="lb-meta">${p.alive} team${p.alive !== 1 ? 's' : ''} still in</div>
          </div>
          <div class="lb-bar-wrap" style="margin-right:12px">
            <div class="lb-bar" style="width:${barPct}%"></div>
          </div>
          <div>
            <div class="lb-pts" style="color:${p.color}">${p.total}</div>
            <div class="lb-pts-label">pts</div>
          </div>
        </div>
      `;
    });
  }
  html += `</div>`;

  // Player cards
  html += `<div class="players-grid">`;

  DRAW.forEach(p => {
    const pData = players.find(x => x.name === p.name);
    const total = pData?.total || 0;
    const alive = pData?.alive ?? p.teams.length;

    html += `
      <div class="player-card">
        <div class="player-header">
          <div class="p-avatar" style="background:linear-gradient(135deg,${p.color},${p.color2})">${p.name[0]}</div>
          <div style="flex:1">
            <div class="p-name">${p.name}</div>
            <div class="p-sub">${alive} of 8 teams still in</div>
          </div>
          <div class="p-pts">
            <div class="p-pts-num" style="color:${p.color}">${total}</div>
            <div class="p-pts-label">pts</div>
          </div>
        </div>
        <div class="teams-list">
    `;

    // Sort: winner first, then by pts desc, eliminated last
    const sorted = [...p.teams].sort((a, b) => {
      const sa = stats[a], sb = stats[b];
      if (sa?.isWinner && !sb?.isWinner) return -1;
      if (!sa?.isWinner && sb?.isWinner) return 1;
      const pa = calcPoints(a, stats, appearedInKnockout);
      const pb = calcPoints(b, stats, appearedInKnockout);
      if (pa !== pb) return pb - pa;
      if (sa?.isEliminated && !sb?.isEliminated) return 1;
      if (!sa?.isEliminated && sb?.isEliminated) return -1;
      return 0;
    });

    sorted.forEach(teamName => {
      const s = stats[teamName];
      const { label, badgeClass, rowClass } = getTeamStatus(teamName, s, appearedInKnockout);
      const flag = FLAGS[teamName] || '🏳';

      // W/D/L record
      const record = s && s.gp > 0 ? `${s.gw}W ${s.gdraw}D ${s.gl}L` : '';

      // Goal difference
      let gdHtml = '';
      if (s && s.gp > 0) {
        const gd = s.gf - s.ga;
        const gdClass = gd > 0 ? 'pos' : gd < 0 ? 'neg' : 'zero';
        const gdStr = gd > 0 ? `+${gd}` : String(gd);
        gdHtml = `<span class="t-gd ${gdClass}">GD ${gdStr}</span>`;
      }

      const teamPts = calcPoints(teamName, stats, appearedInKnockout);
      const ptsDisplay = anyPlayed ? `<span style="font-size:11px;font-weight:700;color:#555;margin-right:2px">${teamPts}pt</span>` : '';

      html += `
        <div class="team-row ${rowClass}">
          <span class="t-flag">${flag}</span>
          <span class="t-name">${teamName}</span>
          ${ptsDisplay}
          <span class="t-record">${record}</span>
          ${gdHtml}
          <span class="t-badge ${badgeClass}">${label}</span>
        </div>
      `;
    });

    html += `</div></div>`;
  });

  html += `</div>`;

  document.getElementById('main').innerHTML = html;
  document.getElementById('main').className = '';
}

// ──────────────────────────────────────────────────────────────────────────
// BOOT — load now, then auto-refresh every 2 minutes
// ──────────────────────────────────────────────────────────────────────────
loadData();
setInterval(loadData, 2 * 60 * 1000);
</script>
